<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="source/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>

    <title>World-Clock-Js</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock⏱️</h1>

      <select>
        <option value="">Choose a city</option>
        <option value="">Paris</option>
        <option value="">Vienna</option>
        <option value="">Los Angeles</option>
      </select>

      <div class="city" id="London">
        <div>
          <h2>London</h2>
          <div class="date" id="date"></div>
        </div>
        <div class="time" id="time"></div>
      </div>

      <div class="city" id="Toronto">
        <div>
          <h2>Toronto</h2>
          <div class="date" id="date"></div>
        </div>

        <div class="time" id="time"></div>
      </div>
    </div>

    <footer>
      This code was coded with ❤️ by
      <a href="https://github.com/domer078">Khomotso Mabala</a> and open-sourced
      on <a href="https://github.com/Domer078/world-clock-js">GitHub</a> and
      hosted on
      <a href="https://world-clock-app-demo.netlify.app/">Netlify</a>
    </footer>
    <script src="source/index.js"></script>
  </body>
</html>
